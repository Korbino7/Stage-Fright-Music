<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Tickets - Stage Fright</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        section {
            padding: 2rem;
            margin: 1rem 0;
            text-align: center;
        }
        h2 {
            color: #444;
        }
        .ticket-options {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .ticket-option {
            background-color: #fff;
            padding: 1rem;
            margin: 1rem;
            border: 1px solid #ccc;
            border-radius: 10px;
            width: 200px;
            text-align: center;
        }
        .ticket-option h4 {
            margin: 0.5rem 0;
        }
        .ticket-option p {
            margin: 1rem 0;
        }
        button {
            padding: 10px 20px;
            background-color: #444;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #555;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Buy Tickets - Stage Fright Tour</h1>
</header>

<section>
    <h2>Select Your Show</h2>
    <div class="ticket-options">
        <div class="ticket-option">
            <h4>Los Angeles, CA</h4>
            <p>October 15, 2024</p>
            <button>Buy Now</button>
        </div>
        <div class="ticket-option">
            <h4>New York, NY</h4>
            <p>November 20, 2024</p>
            <button>Buy Now</button>
        </div>
        <div class="ticket-option">
            <h4>Chicago, IL</h4>
            <p>December 5, 2024</p>
            <button>Buy Now</button>
        </div>
        <div class="ticket-option">
            <h4>Austin, TX</h4>
            <p>January 12, 2025</p>
            <button>Buy Now</button>
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2024 Stage Fright. All Rights Reserved.</p>
</footer>

</body>
</html>
